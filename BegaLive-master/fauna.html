<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BegaLive – Enciclopedie Faună</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal-deep:    #042f2e;
            --teal-bright:  #14b8a6;
            --text-primary: #f0fdfa;
            --text-muted:   #5eead4;
            --glass:        rgba(13, 79, 76, 0.45);
            --glass-border: rgba(94, 234, 212, 0.2);
            --font-display: 'DM Serif Display', serif;
            --font-body:    'Outfit', sans-serif;
            --font-mono:    'DM Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--teal-deep); 
            color: var(--text-primary); 
            font-family: var(--font-body); 
            padding: 40px; 
            max-width: 1100px; 
            margin: 0 auto; 
            min-height: 100vh;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: -1; opacity: 0.4;
        }
        
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding-bottom: 2rem; border-bottom: 1px solid var(--glass-border); margin-bottom: 30px; 
        }
        h1 { font-family: var(--font-display); color: var(--teal-bright); font-size: 2.5rem; margin: 0; }
        .back-btn { 
            padding: 8px 16px; background: rgba(20,184,166,0.1); border: 1px solid var(--teal-bright); 
            color: var(--teal-bright); text-decoration: none; border-radius: 6px; 
            font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; transition: all 0.2s; 
        }
        .back-btn:hover { background: rgba(20,184,166,0.3); }

        /* Stiluri Generate JS */
        .filter-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; align-items: center; }
        .filter-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--glass-border);
            background: rgba(20,184,166,0.1); color: var(--teal-light); cursor: pointer;
            font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .filter-btn.active { background: var(--teal-bright); color: var(--teal-deep); border-color: var(--teal-bright); font-weight: 600; }
        .search-input {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: var(--glass); color: var(--text-primary); font-family: var(--font-body);
            width: 220px; backdrop-filter: blur(12px); margin-left: auto; outline: none;
        }
        .search-input::placeholder { color: rgba(153, 246, 228, 0.5); }
        .search-input:focus { border-color: var(--teal-bright); }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 16px; overflow: hidden; backdrop-filter: blur(12px);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .card:hover { border-color: var(--teal-bright); box-shadow: 0 8px 24px rgba(0,0,0,0.4); transform: translateY(-2px); }
        
        .card-header {
            padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px;
            background: rgba(13, 79, 76, 0.4); transition: background 0.2s;
        }
        .card-header:hover { background: rgba(13, 79, 76, 0.8); }
        .card-header.open { border-bottom: 1px solid rgba(94, 234, 212, 0.15); background: rgba(13, 79, 76, 0.7); }
        
        .badge {
            font-size: 10px; padding: 3px 10px; border-radius: 12px; font-weight: 600;
            font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px;
        }
        
        .card-body { padding: 20px; background: rgba(4, 47, 46, 0.6); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-body p { font-size: 0.92rem; color: #cdeee9; line-height: 1.6; margin-bottom: 16px; font-weight: 300; }
        .section-title {
            font-size: 11px; font-weight: 600; color: var(--teal-bright);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-family: var(--font-mono);
        }
        .facts-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .facts-list li {
            font-size: 0.88rem; color: #f0fdfa; padding: 6px 0 6px 24px; position: relative;
            border-bottom: 1px solid rgba(94, 234, 212, 0.08); font-weight: 300;
        }
        .facts-list li::before { content: '✨'; position: absolute; left: 0; top: 7px; font-size: 12px; }
        .facts-list li:last-child { border-bottom: none; }
        
        .bega-box {
            background: rgba(20, 184, 166, 0.08); border-left: 3px solid var(--teal-bright);
            border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 0.88rem; color: #e0f2fe; line-height: 1.5;
            font-style: italic;
        }

        @media (max-width: 650px) {
            .filter-container { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; margin-left: 0; margin-top: 8px; }
            header { flex-direction: column-reverse; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" class="back-btn">← Harta Principală</a>
        <h1>🌿 Enciclopedia Faunei</h1>
    </header>

    <div id="app"></div>

    <script>
    const species = [
      {g:'mamifere',gl:'Mamifer',icon:'🦫',name:'Nutrie',latin:'Myocastor coypus',
       desc:'Mamifer semiacvatic originar din America de Sud, introdus în Europa pentru blana sa. Pe Bega s-a adaptat perfect, construind galerii în malurile argiloase. Activă la amurg și noapte, înoată lăsând un V caracteristic pe apă.',
       facts:['Poate sta sub apă până la 5 minute fără să respire','Incisivii sunt portocalii — din cauza fierului din smalțul dentar','O femelă poate naște până la 13 pui pe an','Blana are două straturi: exterior impermeabil și puf interior termoizolant','Nu e înrudită cu castorul, deși seamănă'],
       bega:'Coloniile de nutrii sunt vizibile pe malurile Begăi între Timișoara și granița cu Serbia. Le poți observa dimineața devreme înotând liniștit lângă maluri sau hrănindu-se cu stuf.'},
      {g:'pesti',gl:'Pești',icon:'🦀',name:'Crab de râu',latin:'Potamon fluviatile',
       desc:'Singurul crab de apă dulce nativ din România — o raritate zoologică. Preferă substratul pietros și apă bine oxigenată. Prezența sa indică o calitate ecologică ridicată a apei.',
       facts:['Specie relictă mediteraneană, supraviețuitor din era glaciară','Puii ies direct ca mini-crabi — fără fază larvară planctonică','Femelele poartă ouăle sub abdomen luni de zile','Poate trăi atât în apă cât și pe uscat','Strict protejat prin lege în România'],
       bega:'Prezent mai ales în afluenții Begăi cu substrat pietros. Găsirea unui crab de râu este un semn al calității ridicate a apei în acel sector.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Caras',latin:'Carassius gibelio',
       desc:'Regele supraviețuirii — extrem de adaptabil, rezistă la poluare, oxigen scăzut și variații mari de temperatură. Una din cele mai frecvente specii din Bega.',
       facts:['Populațiile sunt 70–90% femele — se reproduc prin ginogeneză (fără masculi)','Supraviețuiește ore întregi în afara apei dacă e umed','Rezistă iernile în letargie pe fundul apei, sub gheață','Este ancestrul carasului auriu decorativ'],
       bega:'Una din cele mai abundente specii pe întreg cursul Begăi. Poate fi pescuit de pe cheiurile din centrul Timișoarei.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Avat',latin:'Aspius aspius',
       desc:'Singurul pește răpitor din familia crapului din Europa. Elegant și rapid, vânează la suprafața apei sărind spectaculos. Preferat de pescarii cu muscă și spinning.',
       facts:['Înrudit cu cleanul, dar a evoluat ca răpitor pur','Poate atinge 30 km/h în scurte explozii','Vânează în grup, coordonând atacuri la suprafață','Inclus în Directiva Habitate a UE — specie protejată'],
       bega:'Prezent pe sectoarele cu curent mai alert. Zgomotul unui atac de avat — un plescăit puternic — îl trădează imediat vara.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Biban',latin:'Perca fluviatilis',
       desc:'Ușor de recunoscut după dungile verticale negre și înotătoarea dorsală spinoasă. Prădător oportunist și extrem de agresiv raportat la dimensiunea sa.',
       facts:['Trăiește în bancuri strict ierarhizate','Ghimpii dorsali secretă o mucozitate ușor iritantă','Un biban de 500g poate devora pești aproape la fel de mari','Hibridizează extrem de rar — genetic foarte stabil'],
       bega:'Prezent pe tot cursul Begăi, cu concentrații în zonele adânci și lângă piloni de pod.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Șalău',latin:'Sander lucioperca',
       desc:'Cel mai valoros pește răpitor din Bega și trofeul suprem al pescuitului sportiv local. Vânător nocturn de elită, dominant în ecosistemul piscicol al râului.',
       facts:['Vede perfect în întuneric — are strat tapetum lucidum ca pisicile','Detectează vibrațiile prăzii de la distanțe mari','Exemplarele bătrâne devin solitare și teritoriale'],
       bega:'Vedeta Begăi pentru pescarii sportivi. Pescuitul nocturn pe Bega pentru șalău este o tradiție locală.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Somn',latin:'Silurus glanis',
       desc:'Cel mai mare pește de apă dulce din Europa. Domină straturile adânci ale Begăi, vânând orice se mișcă — de la pești mari la păsări acvatice.',
       facts:['Poate atinge 3 metri lungime și 150kg','Vânează și păsări acvatice de pe maluri','Comunică prin grohăituri și pocnituri subacvatice','Nu are solzi — pielea e acoperită cu mucus protector'],
       bega:'Pe Bega au fost capturați somni de 40–60kg în sectoarele adânci. Regele necontestat al nopților.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Plătică',latin:'Abramis brama',
       desc:'Peștele cu corpul cel mai turtit lateral din Bega. Un pește de fund liniștit care filtrează mâlul bogat al râului, formând bancuri impresionante.',
       facts:['Secretă un strat gros de mucus — scapă din mână cu ușurință','Formează bancuri de sute de indivizi sincronizați','Hibridizează natural cu roșioara și alți ciprinizi'],
       bega:'Bancuri impresionante populează zonele lente și adânci din afara zonelor betonate.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Roșioară',latin:'Scardinius erythrophthalmus',
       desc:'Viu colorat, cu irizații aurii și înotătoare roșu-aprins. Preferă zonele cu vegetație acvatică bogată, unde vânează insecte la suprafața apei.',
       facts:['Ochii sunt și ei roșii — de la pigmentul carotenoid din alimentație','Indicator bun al vegetației acvatice sănătoase','Poate sări din apă pentru a prinde insecte'],
       bega:'Frecventă în zonele cu stuf de pe maluri. Poate fi văzută sărind după insecte în serile calde de vară.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Oblete',latin:'Alburnus alburnus',
       desc:'Micul pește argintiu al Begăi, prezent în bancuri strălucitoare. Veriga de bază a lanțului trofic — hrănește șalăul, bibanul, avatul și egretele.',
       facts:['Solzii au fost folosiți în Evul Mediu pentru perle artificiale','Un banc poate număra mii de indivizi perfect sincronizați','Extrem de sensibili la calitatea apei'],
       bega:'Sunt baza alimentară a aproape tuturor prădătorilor din ecosistemul Begăi. Abundenți primăvara.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Mreană',latin:'Barbus barbus',
       desc:'Peștele cu mustăți al râurilor curate — indicator ecologic de primă clasă. Corp fusiform și puternic, adaptat curentului rapid.',
       facts:['ATENȚIE: icrele de mreană sunt otrăvitoare!','Mustățile sunt organe senzoriale ultra-sensibile','Migrează zeci de km în amonte pentru reproducere'],
       bega:'Preferă afluenții mai curati și sectoarele necanalizate. Prezența mrenelor e considerată un indicator ecologic.'},
      {g:'pesti',gl:'Pești',icon:'🐟',name:'Lin',latin:'Tinca tinca',
       desc:'Peștele misterios al apelor liniștite, ascuns în vegetația deasă și mâlul bogat. Nocturn și rar văzut, dar mereu prezent.',
       facts:['În Evul Mediu era numit "doctorul peștilor" datorită mucusului','Poate supraviețui în noroi aproape uscat','Mucusul se oxidează la aer și capătă nuanțe de aur'],
       bega:'Populează zonele cu vegetație deasă și fund mâlos, mai ales în brațele laterale.'},
      {g:'amfibieni',gl:'Amfibieni',icon:'🐸',name:'Broască râioasă brună',latin:'Bufo bufo',
       desc:'Cea mai mare broască din România și un prădător neobosit de insecte. Complet inofensivă pentru oameni.',
       facts:['Poate trăi 30–40 de ani','Migrează în masă primăvara spre locurile de reproducere','Nu are dinți — înghite prada vie, ajutându-se cu ochii'],
       bega:'Noaptea, sute de indivizi se deplasează spre locurile de reproducere primăvara pe malurile naturale.'},
      {g:'amfibieni',gl:'Amfibieni',icon:'🐸',name:'Broască râioasă verde',latin:'Bufotes viridis',
       desc:'Mai mică și mai elegantă, impresionează prin patternul verde strident. Cea mai adaptabilă amfibie din zonă.',
       facts:['Patternul verde este unic pentru fiecare individ','Cântecul masculilor se aude de la 500m distanță','Activă și la 40°C — rezistentă excepțional la căldură'],
       bega:'Frecventă pe malurile urbanizate. Vara, cântecul ei nocturn face parte din coloana sonoră a Begăi urbane.'},
      {g:'amfibieni',gl:'Amfibieni',icon:'🐸',name:'Broască roșie de pădure',latin:'Rana dalmatina',
       desc:'Acrobata amfibienilor europeni, deține recordul european la săritură relativă. Vine la apă doar pentru reproducere.',
       facts:['Poate sări până la 2m dintr-o singură mișcare!','Prima amfibie care se reproduce în România — uneori în februarie','Hibernează în frunzar uscat, nu în apă'],
       bega:'Prezentă în pădurile ripariene de pe maluri, mai ales în luncile din afara Timișoarei.'},
      {g:'amfibieni',gl:'Amfibieni',icon:'🐸',name:'Brotăcel',latin:'Hyla arborea',
       desc:'Cel mai mic și mai agil amfibian din zonă, singurul "cățărător" local. Verdele smarald îl face aproape invizibil pe frunze.',
       facts:['Ventuzelele pot suporta de 10x greutatea corpului','Prezice vremea: devine mai vocal înainte de ploaie','Poate schimba nuanța verdelui după temperatură'],
       bega:'Colonii în vegetația de stuf și salcie de pe maluri. Corul brotăceilor este incredibil de puternic serile.'},
      {g:'pasari',gl:'Păsări',icon:'🦤',name:'Egretă mică',latin:'Egretta garzetta',
       desc:'O apariție de o eleganță rară — toată în alb imaculat. Vânător acvatic sofisticat din apele puțin adânci.',
       facts:['Agită sedimentul cu picioarele pentru a scoate peștii','Poate sta nemișcată minute întregi așteptând prada','Cuibărește în colonii mixte cu stârcii'],
       bega:'Oaspete regulat al Begăi în lunile calde. Prezența lor în oraș este un semn al revitalizării apei.'},
      {g:'pasari',gl:'Păsări',icon:'🦤',name:'Stârc cenușiu',latin:'Ardea cinerea',
       desc:'Cel mai mare stârc din Europa și emblema neoficială a Begăi. Pescarul suprem al râului — răbdător, precis și implacabil.',
       facts:['Digeră oase, solzi și piele — sistem digestiv extrem de eficient','Zboară cu gâtul îndoit în "S"','Cuibărește în colonii numite "heronneries"'],
       bega:'Cel mai văzut animal sălbatic pe malurile Begăi în Timișoara. Pescarii îl consideră cel mai serios concurent.'}
    ];

    const catStyles = {
        pesti:     { bg: 'rgba(56,189,248,0.1)', txt: '#38bdf8' },
        amfibieni: { bg: 'rgba(74,222,128,0.1)', txt: '#4ade80' },
        mamifere:  { bg: 'rgba(250,204,21,0.1)', txt: '#facc15' },
        pasari:    { bg: 'rgba(192,132,252,0.1)', txt: '#c084fc' }
    };

    // Citim parametrul din URL (ex: fauna.html#pesti)
    let hash = window.location.hash ? window.location.hash.substring(1) : 'all';
    let activeG = ['pesti', 'amfibieni', 'mamifere', 'pasari'].includes(hash) ? hash : 'all';
    let searchQ = '';
    const openCards = new Set();

    function render() {
      const filtered = species.filter(s => {
        const mg = activeG === 'all' || s.g === activeG;
        const ms = !searchQ || (s.name + ' ' + s.latin).toLowerCase().includes(searchQ);
        return mg && ms;
      });

      let html = `<div class="filter-container">
        <button class="filter-btn ${activeG==='all' ? 'active' : ''}" onclick="setG('all')">Toate (18)</button>
        <button class="filter-btn ${activeG==='pesti' ? 'active' : ''}" onclick="setG('pesti')">Pești (12)</button>
        <button class="filter-btn ${activeG==='amfibieni' ? 'active' : ''}" onclick="setG('amfibieni')">Amfibieni (4)</button>
        <button class="filter-btn ${activeG==='mamifere' ? 'active' : ''}" onclick="setG('mamifere')">Mamifere (1)</button>
        <button class="filter-btn ${activeG==='pasari' ? 'active' : ''}" onclick="setG('pasari')">Păsări (2)</button>
        <input class="search-input" type="text" placeholder="Caută specie..." value="${searchQ}" oninput="setSearch(this.value)">
      </div>`;

      if (filtered.length === 0) {
        html += '<p style="text-align:center; color: var(--text-muted); padding: 2rem;">Nicio specie găsită conform filtrelor.</p>';
      } else {
        html += '<div class="card-grid">';
        filtered.forEach((s, i) => {
          const id = i + s.name;
          const open = openCards.has(id);
          const style = catStyles[s.g];
          
          html += `<div class="card">
            <div class="card-header ${open ? 'open' : ''}" onclick="toggleCard('${id}')">
              <span style="font-size:28px">${s.icon}</span>
              <div style="flex:1">
                <span class="badge" style="background:${style.bg}; color:${style.txt}">${s.gl}</span>
                <div style="font-size:16px; font-weight:600; margin-top:4px; color:var(--text-primary)">${s.name}</div>
                <div style="font-size:12px; color:var(--text-muted); font-style:italic; margin-top:2px">${s.latin}</div>
              </div>
              <span style="color: var(--teal-bright); font-size: 14px;">${open ? '▲' : '▼'}</span>
            </div>`;
            
          if (open) {
            html += `<div class="card-body">
              <p>${s.desc}</p>
              <div class="section-title">⭐ Curiozități</div>
              <ul class="facts-list">${s.facts.map(f => `<li>${f}</li>`).join('')}</ul>
              <div class="section-title" style="margin-top: 24px;">🌊 Prezență pe Bega</div>
              <div class="bega-box">${s.bega}</div>
            </div>`;
          }
          html += '</div>';
        });
        html += '</div>';
      }

      document.getElementById('app').innerHTML = html;
    }

    function toggleCard(id) {
      if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
      render();
    }
    
    function setG(g) { 
        activeG = g; 
        window.history.pushState(null, null, g === 'all' ? '#' : '#' + g); // Actualizează URL-ul fără refresh
        render(); 
    }
    function setSearch(v) { searchQ = v.toLowerCase(); render(); }

    render();
    </script>
<canvas id="matrix-bg" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.13;"></canvas>
<script>
(function(){
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 20);
  const drops = Array(cols).fill(1);
  const chars = '10';
  function draw() {
    ctx.fillStyle = 'rgba(4, 47, 46, 0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#14b8a6';
    ctx.font = '15px DM Mono, monospace';
    for (let i = 0; i < drops.length; i++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = Math.random() > 0.85 ? '#4ade80' : '#14b8a6';
      ctx.fillText(char, i * 20, drops[i] * 20);
      if (drops[i] * 20 > canvas.height && Math.random() > 0.97) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 45);
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
})();
</script>
</body>
</html>
